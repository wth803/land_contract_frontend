<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="土地承包明细管理系统 - 登录" />
    <title>登录 - 土地承包明细管理系统</title>
    <link rel="stylesheet" href="css/style.css" />
</head>
<body class="login-page">

    <div class="login-card">

        <!-- 登录卡片标题 -->
        <div class="login-header">
            <span class="login-logo" aria-hidden="true">🌾</span>
            <h1>土地承包明细管理系统</h1>
        </div>

        <!-- 登录表单 -->
        <form id="login-form" class="login-form" novalidate>

            <div class="form-group">
                <label class="form-label" for="login-username">
                    用户名<span class="required" aria-label="必填">*</span>
                </label>
                <input
                    type="text"
                    id="login-username"
                    class="form-input"
                    placeholder="请输入用户名"
                    autocomplete="username"
                    maxlength="100"
                    required
                />
            </div>

            <div class="form-group">
                <label class="form-label" for="login-password">
                    密码<span class="required" aria-label="必填">*</span>
                </label>
                <input
                    type="password"
                    id="login-password"
                    class="form-input"
                    placeholder="请输入密码"
                    autocomplete="current-password"
                    maxlength="100"
                    required
                />
            </div>

            <!-- 错误提示 -->
            <div id="login-error" class="login-error" role="alert"></div>

            <button id="login-btn" class="btn btn-primary" type="submit">登录</button>

        </form>

    </div>

    <script src="js/api.js"></script>
    <script>
        // 已登录则直接跳转主页
        if (localStorage.getItem('access_token')) {
            window.location.href = 'index.html';
        }

        document.getElementById('login-form').addEventListener('submit', async function (e) {
            e.preventDefault();

            const username = document.getElementById('login-username').value.trim();
            const password = document.getElementById('login-password').value;
            const errorEl = document.getElementById('login-error');
            const loginBtn = document.getElementById('login-btn');

            errorEl.classList.remove('visible');
            errorEl.textContent = '';

            if (!username || !password) {
                errorEl.textContent = '请填写用户名和密码';
                errorEl.classList.add('visible');
                return;
            }

            loginBtn.disabled = true;
            loginBtn.textContent = '登录中...';

            try {
                const data = await loginApi(username, password);
                localStorage.setItem('access_token', data.access_token);
                localStorage.setItem('username', data.username);
                window.location.href = 'index.html';
            } catch (err) {
                let msg = '用户名或密码错误';
                if (err.data && err.data.detail) {
                    msg = typeof err.data.detail === 'string' ? err.data.detail : msg;
                }
                errorEl.textContent = msg;
                errorEl.classList.add('visible');
                loginBtn.disabled = false;
                loginBtn.textContent = '登录';
            }
        });
    </script>

</body>
</html>
